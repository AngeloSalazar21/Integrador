<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Kenpaku Ferretería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="bg-white border border-gray-200 rounded-lg shadow-sm max-w-md w-full text-center p-10">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>
    <p class="text-5xl font-bold text-gray-900" th:text="${codigo} ?: (${status} ?: 'Error')">500</p>
    <h1 class="text-xl font-semibold text-gray-800 mt-3" th:text="${titulo} ?: (${error} ?: 'Ha ocurrido un error')">Error</h1>
    <p class="text-gray-500 text-sm mt-2" th:text="${mensaje} ?: (${message} ?: 'Algo salió mal. Intenta nuevamente.')">Detalle del error</p>
    <a th:href="@{/}" class="inline-block mt-8 px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium text-sm transition">
        Volver al inicio
    </a>
</div>
</body>
</html>
