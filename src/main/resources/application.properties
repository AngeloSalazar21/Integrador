spring.datasource.url=jdbc:postgresql://localhost:5432/kenpaku
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=admin
spring.datasource.password=admin123
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=false
server.port=8080

# ============================================================
# MONITOREO (Spring Boot Actuator)
# ============================================================
# Endpoints expuestos por HTTP. health/info son públicos (ver SecurityConfig);
# el resto requiere autenticación.
management.endpoints.web.exposure.include=health,info,metrics,loggers,env,mappings
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
# Metadatos mostrados en /actuator/info
management.info.env.enabled=true
info.app.nombre=Kenpaku Ferretería
info.app.descripcion=Sistema de gestión de inventario para distribuidora ferretera
info.app.version=0.0.1-SNAPSHOT

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.kenpaku.ferreteria=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
# Archivo de log rotativo para revisión posterior (ver plan de monitoreo)
logging.file.name=logs/kenpaku.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=200MB
