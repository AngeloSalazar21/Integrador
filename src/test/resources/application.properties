# Configuración exclusiva para pruebas: base de datos H2 en memoria.
# Evita depender de un PostgreSQL en ejecución durante los tests.
spring.datasource.url=jdbc:h2:mem:kenpaku_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
